name: Docs

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

env:
  SCCACHE_GHA_ENABLED: true
  RUSTC_WRAPPER: sccache

jobs:
  docs:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - uses: mozilla-actions/sccache-action@v0.0.9
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang
          python -m venv .venv
          . .venv/bin/activate
          echo "$VIRTUAL_ENV/bin" >> "$GITHUB_PATH"
          echo "VIRTUAL_ENV=$VIRTUAL_ENV" >> "$GITHUB_ENV"
          pip install maturin pdoc numpy
      - name: Build webgraph
        run: cd webgraph && maturin develop --release --strip
        env:
          CARGO_PROFILE_RELEASE_DEBUG: "false"
      - name: Build webgraph-swh
        run: cd webgraph-swh && maturin develop --release --strip
        env:
          CARGO_PROFILE_RELEASE_DEBUG: "false"
      - name: Generate docs
        run: pdoc webgraph webgraph_swh -o site/
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site/
      - id: deploy
        uses: actions/deploy-pages@v4
